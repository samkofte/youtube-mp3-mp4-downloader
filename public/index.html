<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Streamer</title>
    <meta name="description" content="A modern, fast YouTube alternative.">
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">

    <!-- Tailwind CSS (CDN for quick setup) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        darker: '#020617',
                        primary: '#3b82f6',
                        primaryHover: '#2563eb'
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-darker text-slate-200 font-sans antialiased min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-dark/90 backdrop-blur border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center cursor-pointer" id="logo">
                    <svg class="h-8 w-8 text-primary" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                    <span class="ml-2 text-xl font-bold text-white tracking-tight">YT Streamer</span>
                </div>
                
                <div class="flex-1 max-w-2xl mx-4 relative">
                    <div class="relative group">
                        <input type="text" id="searchInput" 
                            class="w-full bg-slate-800 text-white rounded-full pl-4 pr-10 py-2 focus:outline-none focus:ring-2 focus:ring-primary transition-all shadow-inner"
                            placeholder="Search videos..." autocomplete="off">
                        <div class="absolute right-3 top-2.5 text-slate-400">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                    </div>
                    <!-- Suggestions Dropdown -->
                    <div id="suggestionsDropdown" class="hidden absolute top-full left-0 right-0 bg-slate-800 border border-slate-700 mt-2 rounded-xl shadow-2xl overflow-hidden z-50">
                        <!-- Injected by JS -->
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <a href="/docs.html" class="text-slate-400 hover:text-white transition-colors" title="API Docs" target="_blank">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </a>
                    <button id="historyBtn" class="text-slate-400 hover:text-white transition-colors" title="History">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <!-- View Container (Toggled by JS) -->
        <div id="homeView" class="block">
            <h2 class="text-2xl font-bold mb-6 text-white flex items-center">
                <svg class="h-6 w-6 mr-2 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12.395 2.553a1 1 0 00-1.45-.385c-.345.23-.614.558-.822.88-.214.33-.403.713-.57 1.116-.334.804-.614 1.768-.84 2.734a31.365 31.365 0 00-.613 3.58 2.64 2.64 0 01-.945-1.067c-.328-.68-.398-1.534-.398-2.654A1 1 0 005.05 6.05 6.981 6.981 0 003 11a7 7 0 1011.95-4.95c-.592-.591-.98-.985-1.348-1.467-.363-.476-.724-1.063-1.207-2.03zM12.12 15.12A3 3 0 017 13s.879.5 2.5.5c0-1 .5-4 1.25-4.5.5 1 .786 1.293 1.371 1.879A2.99 2.99 0 0113 13a2.99 2.99 0 01-.879 2.121z" clip-rule="evenodd"></path></svg>
                Trending
            </h2>
            <!-- Video Grid -->
            <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Skeletons or Video Cards will be injected here -->
            </div>
        </div>

        <!-- Video Detail View -->
        <div id="videoView" class="hidden flex flex-col lg:flex-row gap-8">
            <!-- Left: Player & Details -->
            <div class="w-full lg:w-2/3">
                <div class="aspect-video bg-black rounded-xl overflow-hidden shadow-2xl relative mb-4">
                    <video id="player" controls class="w-full h-full" preload="metadata">
                        Your browser does not support the video tag.
                    </video>
                </div>
                
                <h1 id="videoTitle" class="text-2xl font-bold text-white mb-2">Video Title</h1>
                <div class="flex items-center justify-between border-b border-slate-700 pb-4 mb-4">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-slate-700 rounded-full flex items-center justify-center font-bold text-lg" id="channelAvatar">C</div>
                        <div>
                            <p class="font-semibold text-white" id="videoChannel">Channel Name</p>
                            <p class="text-sm text-slate-400" id="videoStats">1M views • 2 days ago</p>
                        </div>
                    </div>
                    <button id="favoriteBtn" class="flex items-center space-x-1 bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-full transition-colors">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                        <span>Save</span>
                    </button>
                </div>
            </div>
            
            <!-- Right: Downloads & Suggestions -->
            <div class="w-full lg:w-1/3 space-y-6">
                <div class="bg-slate-800 rounded-xl p-5 border border-slate-700">
                    <h3 class="text-lg font-bold text-white mb-4">Downloads</h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">MP4 Video</label>
                            <div class="flex space-x-2">
                                <select id="mp4Quality" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-primary w-full">
                                    <option value="1080">1080p</option>
                                    <option value="720" selected>720p</option>
                                    <option value="480">480p</option>
                                    <option value="360">360p</option>
                                </select>
                                <button id="downloadMp4Btn" class="bg-primary hover:bg-primaryHover text-white px-4 py-2 rounded-lg font-medium transition-colors whitespace-nowrap flex items-center">
                                    <svg class="h-4 w-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                    MP4
                                </button>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">MP3 Audio</label>
                            <div class="flex space-x-2">
                                <select id="mp3Quality" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-primary w-full">
                                    <option value="320">320 kbps</option>
                                    <option value="192" selected>192 kbps</option>
                                    <option value="128">128 kbps</option>
                                </select>
                                <button id="downloadMp3Btn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg font-medium transition-colors whitespace-nowrap flex items-center">
                                    <svg class="h-4 w-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                    MP3
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col space-y-2"></div>

    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
